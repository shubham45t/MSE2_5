name: Deploy Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Clean old containers
        run: docker-compose down --remove-orphans || true

      - name: Build and start containers
        run: docker-compose up -d --build

      - name: Show running containers
        run: docker ps